<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Particles & Hand Tracking</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        #video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: 150px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.5);
            z-index: 10;
        }

        #input-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* Mirror the video */
        }

        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            width: 220px;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            text-align: center;
            color: #fff;
        }

        .control-group {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.9rem;
            color: #aaa;
        }

        button {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            border: none;
            padding: 10px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            font-weight: 600;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }

        .status {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            pointer-events: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.5rem;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>

    <div id="loading">Loading AI Models...<br><span style="font-size: 1rem; color: #aaa;">Please allow camera
            access</span></div>

    <div id="video-container">
        <video id="input-video"></video>
    </div>

    <div class="status" id="status-text">Initializing...</div>

    <div id="ui-panel">
        <h2>Particles Control</h2>

        <div class="control-group">
            <label>Shape Template</label>
            <button onclick="setShape('heart')">Heart</button>
            <button onclick="setShape('flower')">Flower</button>
            <button onclick="setShape('saturn')">Saturn</button>
            <button onclick="setShape('buddha')">Buddha</button>
            <button onclick="setShape('fireworks')">Fireworks</button>
        </div>

        <div class="control-group">
            <label>Color</label>
            <input type="color" id="colorPicker" value="#00ffff">
        </div>

        <div style="margin-top: 10px; font-size: 0.8rem; color: #888; text-align: center;">
            Only one hand required. <br> Close hand to contract, open to expand.
        </div>
    </div>

    <script>
        // --- Configuration ---
        const PARTICLE_COUNT = 8000;
        const PARTICLE_SIZE = 0.08;
        const AUTO_ROTATE_SPEED = 0.5;

        // --- Globals ---
        let scene, camera, renderer, particles, controls;
        let positions, targetPositions;
        let clock = new THREE.Clock();
        let currentShape = 'heart';
        let handTension = 0; // 0 = relaxed (open), 1 = tense (closed)
        let isHandDetected = false;

        // --- 1. Setup Three.js Scene ---
        function initScene() {
            const container = document.body;
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.035);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 8;
            camera.position.y = 2;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Orbit Controls
            if (THREE.OrbitControls) {
                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.autoRotate = true;
                controls.autoRotateSpeed = AUTO_ROTATE_SPEED;
            }

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);

            // Particles
            createParticles();

            // Resize Handler
            window.addEventListener('resize', onWindowResize, false);
        }

        function createParticles() {
            const geometry = new THREE.BufferGeometry();
            positions = new Float32Array(PARTICLE_COUNT * 3);
            targetPositions = new Float32Array(PARTICLE_COUNT * 3);

            // Initial Positions (Random Sphere)
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const x = (Math.random() - 0.5) * 10;
                const y = (Math.random() - 0.5) * 10;
                const z = (Math.random() - 0.5) * 10;
                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: 0x00ffff,
                size: PARTICLE_SIZE,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Set initial target
            generateTargetPositions('heart');
        }

        // --- 2. Shape Generators ---
        function generateTargetPositions(shape) {
            const tempPositions = [];

            // Helper function to push point
            const addPoint = (x, y, z) => {
                tempPositions.push(x, y, z);
            };

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let x, y, z;

                if (shape === 'heart') {
                    // Parametric Heart
                    // x = 16sin^3(t)
                    // y = 13cos(t) - 5cos(2t) - 2cos(3t) - cos(4t)
                    // Extended to 3D with various layers
                    const t = Math.random() * Math.PI * 2;
                    const scale = 0.15;
                    const layer = (Math.random() - 0.5);

                    x = 16 * Math.pow(Math.sin(t), 3);
                    y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                    z = layer * 4; // Thickness

                    // Add some volume/noise
                    x *= scale;
                    y *= scale;
                    // Rotate to stand up
                    addPoint(x, y + 1, z);
                }
                else if (shape === 'flower') {
                    // Rose curve 3D
                    // r = cos(k * theta)
                    const u = Math.random() * Math.PI * 2;
                    const v = Math.random() * Math.PI;
                    const k = 4; // 4 petals
                    const r = 2 * Math.sin(k * u) * Math.sin(v);

                    x = r * Math.sin(u) * Math.cos(v);
                    y = r * Math.sin(u) * Math.sin(v);
                    z = r * Math.cos(u);

                    // Add a stem or center
                    if (i < PARTICLE_COUNT * 0.1) {
                        x = (Math.random() - 0.5) * 0.5;
                        y = (Math.random() * -3);
                        z = (Math.random() - 0.5) * 0.5;
                    }

                    addPoint(x, y + 1, z);
                }
                else if (shape === 'saturn') {
                    // Planet
                    if (i < PARTICLE_COUNT * 0.6) {
                        // Sphere
                        const u = Math.random() * Math.PI * 2;
                        const v = Math.acos(2 * Math.random() - 1);
                        const r = 1.5;
                        x = r * Math.sin(v) * Math.cos(u);
                        y = r * Math.sin(v) * Math.sin(u);
                        z = r * Math.cos(v);
                        addPoint(x, y, z);
                    } else {
                        // Ring
                        const u = Math.random() * Math.PI * 2;
                        const r = 2.2 + Math.random() * 1.5;
                        x = r * Math.cos(u);
                        z = r * Math.sin(u); // Flat on XZ plane
                        y = (Math.random() - 0.5) * 0.1;

                        // Tilt the ring
                        const angle = Math.PI / 6; // 30 degrees
                        let newX = x * Math.cos(angle) - y * Math.sin(angle);
                        let newY = x * Math.sin(angle) + y * Math.cos(angle);
                        addPoint(newX, newY, z);
                    }
                }
                else if (shape === 'buddha') {
                    // Simplified Buddha (Sitting figure)
                    // We use stacked ellipsoids for Head, Body, and Base (legs)

                    const r = Math.random();
                    let section;

                    if (r < 0.2) {
                        // Head
                        const u = Math.random() * Math.PI * 2;
                        const v = Math.acos(2 * Math.random() - 1);
                        const radius = 0.6;
                        x = radius * Math.sin(v) * Math.cos(u);
                        y = radius * Math.sin(v) * Math.sin(u) + 2.2; // Move up
                        z = radius * Math.cos(v);
                    } else if (r < 0.5) {
                        // Body (Torso)
                        const u = Math.random() * Math.PI * 2;
                        const v = Math.acos(2 * Math.random() - 1);
                        const rx = 1.0;
                        const ry = 1.2;
                        const rz = 0.8;
                        x = rx * Math.sin(v) * Math.cos(u);
                        y = ry * Math.sin(v) * Math.sin(u) + 0.8;
                        z = rz * Math.cos(v);
                    } else {
                        // Base (Legs crossed - wide ellipsoid)
                        const u = Math.random() * Math.PI * 2;
                        const v = Math.acos(2 * Math.random() - 1);
                        const rx = 1.8;
                        const ry = 0.6;
                        const rz = 1.5;
                        x = rx * Math.sin(v) * Math.cos(u);
                        y = ry * Math.sin(v) * Math.sin(u) - 0.6;
                        z = rz * Math.cos(v);
                    }
                    addPoint(x, y, z);
                }
                else if (shape === 'fireworks') {
                    // Spiral Burst
                    const u = Math.random() * 20; // spiral length
                    const v = Math.random() * Math.PI * 2;
                    const radius = u * 0.2;

                    x = radius * Math.cos(v);
                    y = radius * Math.sin(v);
                    z = (Math.random() - 0.5) * 2;

                    // Sphere cap
                    if (Math.random() > 0.5) {
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        const r = Math.random() * 4;
                        x = r * Math.sin(phi) * Math.cos(theta);
                        y = r * Math.sin(phi) * Math.sin(theta);
                        z = r * Math.cos(phi);
                    }
                    addPoint(x, y, z);
                }
            }

            // Shuffle and Assign
            // We shuffle to make the transition look like particles are flying randomly to new spots
            // rather than linearly morphing if the index order matches
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                targetPositions[i * 3] = tempPositions[i * 3];
                targetPositions[i * 3 + 1] = tempPositions[i * 3 + 1];
                targetPositions[i * 3 + 2] = tempPositions[i * 3 + 2];
            }
        }

        function setShape(shapeName) {
            currentShape = shapeName;
            generateTargetPositions(shapeName);
        }

        // --- 3. Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (controls) controls.update();

            const time = clock.getElapsedTime();
            const positionsArray = particles.geometry.attributes.position.array;

            // Hand Influence
            // If hand is closed (tension=1), we want particles to contract (scale down or move to center)
            // If hand is open (tension=0), standard scale.
            // Let's say default scale is 1.0. 
            // Closed hand -> scale 0.5
            // Open hand  -> scale 1.2

            // Smoothing the hand tension value
            // We use 'handTension' which comes from the MediaPipe callback

            let targetScale = 1.0;
            if (isHandDetected) {
                // Map tension (0..1) to scale
                // Tension 0 (Open) -> Scale 1.5
                // Tension 1 (Closed) -> Scale 0.4
                targetScale = 1.5 - (handTension * 1.1);
            } else {
                // Idle animation breathing
                targetScale = 1.0 + Math.sin(time * 2) * 0.1;
            }

            // Lerp Visualization
            const lerpSpeed = 0.05;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3;
                const iy = i * 3 + 1;
                const iz = i * 3 + 2;

                // Move towards target shape
                // We calculate the "base" position for this frame by lerping expected shape position
                // However, we can just modify the current position array directly towards target

                // Get target values
                let tx = targetPositions[ix];
                let ty = targetPositions[iy];
                let tz = targetPositions[iz];

                // Apply Scaling based on Hand Tension relative to center (0,0,0)
                tx *= targetScale;
                ty *= targetScale;
                tz *= targetScale;

                // Update current position
                positionsArray[ix] += (tx - positionsArray[ix]) * lerpSpeed;
                positionsArray[iy] += (ty - positionsArray[iy]) * lerpSpeed;
                positionsArray[iz] += (tz - positionsArray[iz]) * lerpSpeed;
            }

            particles.geometry.attributes.position.needsUpdate = true;

            // Rotate the whole group slowly if idle
            if (!isHandDetected) {
                particles.rotation.y += 0.002;
            } else {
                // Determine rotation from hand X position? Optional.
                // Keeping it simple as per requirements.
            }

            renderer.render(scene, camera);
        }

        // --- 4. Hand Tracking Logic ---
        function onResults(results) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('status-text').innerText = 'System Active';

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                isHandDetected = true;
                const landmarks = results.multiHandLandmarks[0];

                // Calculate Tension
                // Distance from Wrist (0) to Tips (8, 12, 16, 20)
                // Normalize based on palm size (Distance 0 to 9)

                const wrist = landmarks[0];
                const palmBase = landmarks[9]; // Middle finger MCP
                const palmSize = distance(wrist, palmBase);

                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                const middleTip = landmarks[12];
                const ringTip = landmarks[16];
                const pinkyTip = landmarks[20];

                // Average distance of tips to wrist
                const avgDistToWrist = (
                    distance(wrist, indexTip) +
                    distance(wrist, middleTip) +
                    distance(wrist, ringTip) +
                    distance(wrist, pinkyTip)
                ) / 4;

                // Heuristic:
                // Open hand: AvgDist is large (approx 2x palmSize or more)
                // Closed hand: AvgDist is small (approx equal to palmSize or less)

                // Ratio
                const extensionRatio = avgDistToWrist / (palmSize || 1);

                // Empirical values: Open ~ 2.0+, Closed ~ 0.8
                // Map 0.8...2.2 to 1...0 (Tension)
                // Tension 1 = Closed
                // Tension 0 = Open

                let tension = 1 - ((extensionRatio - 0.8) / (2.2 - 0.8));
                tension = Math.max(0, Math.min(1, tension)); // Clamp

                // Smooth global tension update
                handTension += (tension - handTension) * 0.2;

            } else {
                isHandDetected = false;
                document.getElementById('status-text').innerText = 'No Hand Detected';
            }
        }

        function distance(p1, p2) {
            return Math.sqrt(
                Math.pow(p1.x - p2.x, 2) +
                Math.pow(p1.y - p2.y, 2) +
                Math.pow(p1.z - p2.z, 2) // Landmarks provided in 3D relative coords
            );
        }

        // UI Handlers
        document.getElementById('colorPicker').addEventListener('input', (e) => {
            particles.material.color.set(e.target.value);
        });

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Init Function ---
        async function init() {
            initScene();
            animate();

            const videoElement = document.getElementById('input-video');

            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onResults);

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 320,
                height: 240
            });

            cameraUtils.start()
                .then(() => {
                    console.log('Camera started');
                })
                .catch(err => {
                    console.error('Camera failed', err);
                    document.getElementById('status-text').innerText = 'Camera Error: ' + err.message;
                    alert("Camera access denied or not available. Visualization will run in demo mode.");
                });
        }

        // Start
        init();

    </script>
</body>

</html>
